<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Pour toi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&display=swap" rel="stylesheet">

  <style>
    body {
      background: #faf7f4;
      font-family: 'Playfair Display', serif;
      color: #2c2c2c;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 700px;
      margin: auto;
      padding: 80px 25px;
      text-align: center;
    }
    h1 {
      font-size: 2.4rem;
      font-weight: normal;
      margin-bottom: 10px;
    }
    h2 {
      font-size: 1.1rem;
      font-style: italic;
      color: #666;
      margin-bottom: 60px;
    }
    .poem {
      font-size: 1.15rem;
      line-height: 1.9;
      white-space: pre-line;
      margin-bottom: 70px;
    }
    .signature {
      color: #555;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>[Alana]</h1>
    <h2>Une chose que je voulais te dire</h2>

    <div class="poem">
Je t'aime  
Je t'aime encore  
Je t'aime bcp
    </div>

    <div class="signature">
      — Johnny, ton amoureux
    </div>
  </div>
</body>
</html>
